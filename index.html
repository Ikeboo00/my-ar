<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WebAR サンプル</title>

  <!-- デバッグ用コンソール（確認後に削除してOK） -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', sans-serif; background: #000; color: #fff; }
    a-scene { position: fixed; inset: 0; }

    #start-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #0a0a0a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      padding: 32px;
      transition: opacity 0.4s;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; }
    #start-screen h1 {
      font-size: clamp(28px, 7vw, 48px);
      font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #00ff88, #00aaff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center;
    }
    #start-screen p { font-size: 15px; color: #888; text-align: center; max-width: 300px; line-height: 1.7; }
    #start-btn {
      margin-top: 8px; padding: 16px 40px;
      background: linear-gradient(135deg, #00ff88, #00aaff);
      border: none; border-radius: 100px;
      font-size: 16px; font-weight: 700; color: #000;
      cursor: pointer; transition: transform 0.15s, opacity 0.15s;
    }
    #start-btn:active { transform: scale(0.96); opacity: 0.85; }
    .badge {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: #1a1a1a; border: 1px solid #333;
      border-radius: 100px; font-size: 13px; color: #aaa;
    }
    .badge-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00ff88; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

    #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: none; }
    #hud.visible { display: block; }
    #status-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 16px 20px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex; align-items: center; justify-content: space-between;
    }
    #status-text { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 0.5px; }
    #stop-btn {
      pointer-events: all; padding: 6px 14px;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
      font-size: 13px; color: #fff; cursor: pointer;
    }

    #scan-hint {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(240px, 65vw); height: min(240px, 65vw);
      transition: opacity 0.5s;
    }
    #scan-hint.hidden { opacity: 0; }
    .corner { position: absolute; width: 32px; height: 32px; border-color: #00ff88; border-style: solid; border-width: 0; }
    .corner.tl { top:0;left:0;border-top-width:3px;border-left-width:3px;border-radius:4px 0 0 0; }
    .corner.tr { top:0;right:0;border-top-width:3px;border-right-width:3px;border-radius:0 4px 0 0; }
    .corner.bl { bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 4px; }
    .corner.br { bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 4px 0; }
    #scan-label {
      position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: #00ff88; white-space: nowrap;
      font-weight: 600; letter-spacing: 1px;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #anim-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 20px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      pointer-events: all; opacity: 0; transition: opacity 0.4s;
    }
    #anim-panel.visible { opacity: 1; }
    .anim-btn {
      padding: 10px 18px; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
      font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; transition: all 0.15s;
    }
    .anim-btn.active { background: linear-gradient(135deg,#00ff88,#00aaff); border-color: transparent; color: #000; }
    .anim-btn:active { transform: scale(0.94); }

    #toast {
      position: fixed; bottom: 140px; left: 50%;
      transform: translateX(-50%) translateY(20px); z-index: 50;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 20px; border-radius: 100px;
      font-size: 13px; color: #fff; white-space: nowrap;
      opacity: 0; transition: all 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- A-Frameシーン（常に表示、autoStart: false） -->
<a-scene
  id="ar-scene"
  mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="model"
      src="./model.glb">
    </a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false">
    <a-cursor fuse="false" raycaster="objects: .clickable" color="#00ff88" opacity="0.8" scale="0.5 0.5 0.5"></a-cursor>
  </a-camera>

  <a-entity id="anchor" mindar-image-target="targetIndex: 0">
    <a-ring color="#00ff88" opacity="0.25" radius-inner="0.08" radius-outer="0.12"
      rotation="-90 0 0" position="0 0.001 0"
      animation="property: rotation; from: -90 0 0; to: -90 360 0; dur: 4000; loop: true; easing: linear">
    </a-ring>
    <a-gltf-model id="myModel" class="clickable" src="#model"
      position="0 0 0" scale="1 1 1"
      animation-mixer="clip: default; loop: repeat; crossFadeDuration: 0.3">
    </a-gltf-model>
    <a-entity id="burst" position="0 0.08 0">
      <a-ring id="burst-ring" color="#00ff88" opacity="0" radius-inner="0" radius-outer="0.05" rotation="-90 0 0"></a-ring>
    </a-entity>
  </a-entity>
</a-scene>

<!-- スタート画面 -->
<div id="start-screen">
  <div class="badge"><div class="badge-dot"></div>WebAR デモ</div>
  <h1>NFCタグで<br>ARを起動</h1>
  <p>カメラで<strong>マーカー画像</strong>をスキャンすると<br>3Dキャラクターが出現します。</p>
  <button id="start-btn">カメラを起動する</button>
  <p style="font-size:12px;color:#444;">iOS Safari / Android Chrome 対応</p>
</div>

<!-- HUD -->
<div id="hud">
  <div id="status-bar">
    <span id="status-text">マーカーを探しています…</span>
    <button id="stop-btn">終了</button>
  </div>
  <div id="scan-hint">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scan-label">SCAN MARKER</div>
  </div>
  <div id="anim-panel">
    <button class="anim-btn active" data-clip="default">待機</button>
    <button class="anim-btn" data-clip="Walk">歩く</button>
    <button class="anim-btn" data-clip="Run">走る</button>
    <button class="anim-btn" data-clip="Jump">ジャンプ</button>
    <button class="anim-btn" data-clip="Dance">ダンス</button>
  </div>
</div>

<div id="toast"></div>

<script>
  let eventsSetup = false;

  /* ─── MindARをAFRAMEコンポーネントとして直接登録して起動 ─── */
  AFRAME.registerComponent('ar-starter', {
    init() {
      // このコンポーネント経由でMindARシステムを確実に参照する
      this.el.sceneEl.addEventListener('loaded', () => {
        console.log('[AR] Scene loaded via ar-starter component');
        console.log('[AR] Scene components:', Object.keys(this.el.sceneEl.components));
        window._arScene = this.el.sceneEl;
      });
    }
  });

  /* ─── カメラ起動ボタン ─── */
  document.getElementById('start-btn').addEventListener('click', () => {
    const sceneEl = document.getElementById('ar-scene');

    // コンポーネント名のバリエーションを全部試す
    const sys =
      sceneEl.systems['mindar-image-system'] ||
      sceneEl.components['mindar-image-system'] ||
      sceneEl.systems['mindar-image'] ||
      sceneEl.components['mindar-image'];

    console.log('[AR] systems keys:', Object.keys(sceneEl.systems || {}));
    console.log('[AR] components keys:', Object.keys(sceneEl.components || {}));
    console.log('[AR] sys found:', !!sys);

    if (!sys) {
      showToast('読み込み中です。少し待ってからもう一度タップしてください');
      return;
    }

    try {
      sys.start();
      console.log('[AR] start() called successfully');
    } catch(e) {
      console.error('[AR] start() error:', e);
      showToast('エラー: ' + e.message);
      return;
    }

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('hud').classList.add('visible');

    if (!eventsSetup) {
      setupEvents();
      eventsSetup = true;
    }
  });

  /* ─── 終了ボタン ─── */
  document.getElementById('stop-btn').addEventListener('click', () => {
    const sceneEl = document.getElementById('ar-scene');
    const sys =
      sceneEl.systems['mindar-image-system'] ||
      sceneEl.components['mindar-image-system'] ||
      sceneEl.systems['mindar-image'] ||
      sceneEl.components['mindar-image'];
    if (sys) sys.stop();
    document.getElementById('start-screen').classList.remove('hidden');
    document.getElementById('hud').classList.remove('visible');
    document.getElementById('anim-panel').classList.remove('visible');
    document.getElementById('scan-hint').classList.remove('hidden');
    document.getElementById('status-text').textContent = 'マーカーを探しています…';
  });

  /* ─── マーカー検出イベント ─── */
  function setupEvents() {
    const anchor = document.getElementById('anchor');
    const modelEl = document.getElementById('myModel');

    anchor.addEventListener('targetFound', () => {
      console.log('[AR] targetFound');
      document.getElementById('status-text').textContent = 'マーカー検出！タップしてね';
      document.getElementById('scan-hint').classList.add('hidden');
      document.getElementById('anim-panel').classList.add('visible');
      showToast('マーカーを検出しました ✓');
    });

    anchor.addEventListener('targetLost', () => {
      console.log('[AR] targetLost');
      document.getElementById('status-text').textContent = 'マーカーを探しています…';
      document.getElementById('scan-hint').classList.remove('hidden');
      document.getElementById('anim-panel').classList.remove('visible');
    });

    if (modelEl) {
      modelEl.addEventListener('click', () => {
        triggerBurst();
        showToast('タップ！');
      });
    }
  }

  /* ─── アニメーションボタン ─── */
  document.querySelectorAll('.anim-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const modelEl = document.getElementById('myModel');
      if (!modelEl) return;
      modelEl.setAttribute('animation-mixer',
        `clip: ${btn.dataset.clip}; loop: repeat; crossFadeDuration: 0.3`);
      document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      triggerBurst();
      showToast(`「${btn.textContent}」再生中`);
    });
  });

  /* ─── バースト演出 ─── */
  function triggerBurst() {
    const ring = document.getElementById('burst-ring');
    ring.setAttribute('opacity', '0.7');
    ring.setAttribute('animation__scale', 'property: radius-outer; from: 0.05; to: 0.25; dur: 400; easing: easeOutQuad');
    ring.setAttribute('animation__fade', 'property: opacity; from: 0.7; to: 0; dur: 400; easing: easeOutQuad');
    setTimeout(() => {
      ring.setAttribute('radius-outer', '0.05');
      ring.setAttribute('opacity', '0');
    }, 420);
  }

  /* ─── トースト ─── */
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
